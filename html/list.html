<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>List Name</title> <!-- List name chosen by user -->
        <link rel="stylesheet" href="../css/list.css">
        <script type="module" src="../js/scripts/addMenu.js"></script>
    </head>
    <body>
        <header>
            <div id="top">
                <h1 style="margin-bottom: 0px;">List Name</h1> <!-- List name chosen by user -->

            </div>
            <p style="margin-top: 0px;">List Description</p> <!-- List description chosen by user -->
        </header>
        <div id="statsCreation">
            <p>Stats: 21 / 72 SHOWS | 985 / 4853 EPS [20.3%]</p> <!-- Stats (random temp stats) -->
            <button style="margin-left: 15pt;" onclick="if(document.getElementById('addMenu') == null){openAddMenu();}">Add [+]</button>
        </div>
    </body>
</html>
